services:
  redis:
    image: redis:7.4
    container_name: guitarshop-redis
    ports:
      - "6380:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: guitarshop-zookeeper
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    ports:
      - "2182:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: guitarshop-kafka
    depends_on:
      - zookeeper
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENERS=INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:9092,EXTERNAL://localhost:9093
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    ports:
      - "9093:9093"

  kafka-consumer:
    image: confluentinc/cp-kafka:7.6.0
    container_name: guitarshop-kafka-consumer
    depends_on:
      - kafka
    entrypoint: ["bash", "-c", "kafka-console-consumer --bootstrap-server kafka:9092 --topic order-events --from-beginning --group guitarshop-order"]
