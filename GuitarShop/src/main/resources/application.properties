spring.datasource.url=jdbc:mysql://localhost:3306/guitarshopdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345678

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.thymeleaf.cache=false

# file upload
# File upload disabled - using /data folder only
# app.upload.dir=uploads

server.port=8080

# Redis (cache + session)
spring.data.redis.host=localhost
spring.data.redis.port=6380
spring.cache.type=redis
spring.session.store-type=redis
spring.session.redis.flush-mode=on-save
spring.session.redis.namespace=guitarshop:session

# Kafka
spring.kafka.bootstrap-servers=localhost:9093
spring.kafka.template.default-topic=order-events
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=guitarshop-order
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.guitarshop.event
spring.kafka.listener.missing-topics-fatal=false

app.kafka.order-topic=order-events
