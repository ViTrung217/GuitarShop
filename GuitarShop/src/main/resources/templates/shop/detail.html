<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('Chi tiết sản phẩm')"></head>

<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/">Trang chủ</a></li>
            <li class="breadcrumb-item active" th:text="${product.name}"></li>
        </ol>
    </nav>

    <div class="row">
        <!-- Hình ảnh -->
        <div class="col-md-5">
            <div class="card">
                <img th:src="${product.imagePath}" 
                     class="card-img-top" 
                     style="height: 400px; object-fit: cover;">
            </div>
        </div>

        <!-- Thông tin sản phẩm -->
        <div class="col-md-7">
            <h1 class="fw-bold mb-3" th:text="${product.name}"></h1>
            
            <div class="mb-4">
                <span class="badge bg-secondary me-2" th:text="${product.brand}"></span>
                <span class="badge bg-info" th:text="${product.category.name}"></span>
            </div>

            <div class="card mb-4">
                <div class="card-body">
                    <h2 class="text-danger fw-bold" 
                        th:text="${#numbers.formatDecimal(product.price,0,'COMMA',0,'POINT')} + ' VND'">
                    </h2>
                    <hr>
                    <p>
                        <strong>Tồn kho:</strong>
                        <span class="badge" 
                              th:classappend="${product.stock > 0 ? 'bg-success' : 'bg-danger'}"
                              th:text="${product.stock > 0 ? product.stock + ' cái' : 'Hết hàng'}">
                        </span>
                    </p>
                </div>
            </div>

            <div class="mb-4">
                <h5>Mô tả chi tiết:</h5>
                <p class="text-muted" th:text="${product.description}"></p>
            </div>

            <div class="d-grid gap-2 d-md-flex align-items-center">
                <a href="/" class="btn btn-outline-secondary btn-lg">← Quay lại</a>
                <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post" class="w-100">
                    <div class="input-group">
                        <input type="number" name="quantity" class="form-control" min="1" value="1"
                               th:attr="max=${product.stock}" th:disabled="${product.stock <= 0}">
                        <button type="submit" class="btn btn-success btn-lg"
                                th:disabled="${product.stock <= 0}">
                            🛒 Thêm vào giỏ hàng
                        </button>
                    </div>
                </form>
            </div>
            <!-- Notifications -->
            <div th:if="${param.added}" class="alert alert-success mt-3" id="addedToast" role="alert">
                ✓ <strong>Đã thêm vào giỏ hàng!</strong>
            </div>

            <div class="d-grid gap-2 d-md-flex mt-2">
                <form th:action="@{/checkout}" method="get" class="w-100">
                    <input type="hidden" name="quickBuyId" th:value="${product.id}">
                    <input type="number" name="quantity" class="form-control mb-2" min="1" value="1"
                           th:attr="max=${product.stock}" th:disabled="${product.stock <= 0}">
                    <button type="submit" class="btn btn-primary btn-lg w-100"
                            th:if="${product.stock > 0}">
                        🔥 Mua ngay
                    </button>
                </form>
            </div>

            <div th:if="${product.stock <= 0}" class="alert alert-danger mt-3">
                ⚠️ Sản phẩm hiện đã hết hàng. Vui lòng quay lại sau!
            </div>
        </div>
    </div>

    <!-- Sản phẩm liên quan -->
    <div class="row mt-5">
        <div class="col-md-12">
            <h4>Sản phẩm cùng danh mục</h4>
            <hr>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const addedToast = document.getElementById('addedToast');
    if (addedToast) {
        setTimeout(() => addedToast.remove(), 1500);
    }
</script>
</body>
</html>
