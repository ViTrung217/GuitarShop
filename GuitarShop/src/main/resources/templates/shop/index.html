<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('Guitar Shop')"></head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<!-- Banner -->
<div class="bg-dark text-white text-center py-5">
    <h1 class="display-4">🎸 Guitar Shop</h1>
    <p class="lead">Cửa hàng nhạc cụ chất lượng cao</p>
</div>

<div class="container mt-5">
    <h2 class="mb-4">Sản phẩm nổi bật</h2>

    <div th:if="${param.added}" class="alert alert-success" id="addedToast" role="alert">
        ✓ <strong>Đã thêm vào giỏ hàng!</strong>
    </div>
    
    <div class="row">
        <div class="col-md-3 mb-4" th:each="p : ${products}">
            <div class="card h-100 shadow-sm hover-shadow" style="transition: all 0.3s ease;">
                <div style="height: 250px; overflow: hidden;">
                    <img th:src="${p.imagePath}"
                         class="card-img-top w-100"
                         style="height: 100%; object-fit: cover;">
                </div>

                <div class="card-body d-flex flex-column">
                    <h5 class="card-title fw-bold" th:text="${p.name}"></h5>
                    
                    <p class="card-text text-muted small">
                        <span class="badge bg-secondary" th:text="${p.brand}"></span>
                        <span class="badge bg-info" th:text="${p.category.name}"></span>
                    </p>
                    
                    <p class="card-text" 
                       style="min-height: 40px; font-size: 0.95rem;"
                       th:text="${p.description.length() > 50 ? p.description.substring(0, 50) + '...' : p.description}"></p>
                    
                    <p class="text-danger fw-bold fs-5"
                       th:text="${#numbers.formatDecimal(p.price,0,'COMMA',0,'POINT')} + ' VND'"></p>
                    
                    <div class="d-grid gap-2 mt-auto">
                        <a th:href="@{/product/{id}(id=${p.id})}"
                           class="btn btn-outline-primary btn-sm">
                            👁️ Chi tiết
                        </a>

                        <div class="d-flex gap-2">
                            <form th:action="@{/cart/add/{id}(id=${p.id})}"
                                  method="post" class="flex-grow-1">
                                <div class="input-group input-group-sm">
                                    <input type="number" name="quantity" class="form-control" min="1" value="1"
                                           th:attr="max=${p.stock}">
                                    <button type="submit" class="btn btn-success">
                                        🛒 Thêm giỏ
                                    </button>
                                </div>
                            </form>

                            <form th:action="@{/checkout}" method="get" class="flex-grow-1">
                                <input type="hidden" name="quickBuyId" th:value="${p.id}">
                                <div class="input-group input-group-sm">
                                    <input type="number" name="quantity" class="form-control" min="1" value="1"
                                           th:attr="max=${p.stock}">
                                    <button type="submit" class="btn btn-danger">
                                        ⚡ Mua ngay
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .hover-shadow:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.2) !important;
    }
</style>

<script>
    const addedToast = document.getElementById('addedToast');
    if (addedToast) {
        setTimeout(() => addedToast.remove(), 1500);
    }
</script>

</body>
</html>
