<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="fragments/header :: head('Giỏ hàng')"></head>

<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">
    <h2 class="mb-4">🛒 Giỏ hàng của bạn</h2>
    
    <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show" role="alert">
        ✓ <strong>Đặt hàng thành công!</strong> Cảm ơn bạn đã mua sắm.
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    
    <div th:if="${cart.isEmpty()}" class="alert alert-info">
        <p>Giỏ hàng trống! <a href="/" class="alert-link">Tiếp tục mua sắm</a></p>
    </div>
    
    <div th:if="${not cart.isEmpty()}">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Sản phẩm</th>
                    <th>Số lượng</th>
                    <th>Giá</th>
                    <th>Thành tiền</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${cart.values()}">
                    <td>
                        <img th:src="${item.image}" style="width:50px; height:50px; object-fit:cover" class="me-2">
                        <span th:text="${item.name}"></span>
                    </td>
                    <td>
                        <span class="badge bg-primary" th:text="${item.quantity}"></span>
                    </td>
                    <td th:text="${#numbers.formatDecimal(item.price,0,'COMMA',0,'POINT')} + ' VND'"></td>
                    <td class="fw-bold" th:text="${#numbers.formatDecimal(item.getTotal(),0,'COMMA',0,'POINT')} + ' VND'"></td>
                    <td>
                        <a th:href="@{/cart/remove/{id}(id=${item.productId})}" 
                           class="btn btn-danger btn-sm">
                            Xóa
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
        
        <!-- Tổng cộng -->
        <div class="row mt-4">
            <div class="col-md-6 offset-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Tóm tắt đơn hàng</h5>
                        <hr>
                        <div class="d-flex justify-content-between mb-2">
                            <span>Tổng tiền:</span>
                            <span class="fw-bold text-danger" th:text="${#numbers.formatDecimal(total,0,'COMMA',0,'POINT')} + ' VND'"></span>
                        </div>
                        <hr>
                        <sec:authorize access="isAuthenticated()">
                            <a th:href="@{/checkout}" class="btn btn-success w-100 mt-3">
                                ✓ Thanh toán
                            </a>
                        </sec:authorize>
                        <sec:authorize access="!isAuthenticated()">
                            <a href="/login" class="btn btn-warning w-100">
                                Đăng nhập để thanh toán
                            </a>
                        </sec:authorize>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
