<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('Quản lý sản phẩm')"></head>

<body>
<div th:replace="fragments/admin-navbar :: adminNavbar"></div>

<div class="container mt-4">
    <div class="row mb-4">
        <div class="col-md-8">
            <h2>⚙️ Quản lý sản phẩm</h2>
        </div>
        <div class="col-md-4 text-end">
            <a th:href="@{/admin/products/new}" class="btn btn-success btn-lg">
                + Thêm sản phẩm mới
            </a>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Hình ảnh</th>
                    <th>Tên sản phẩm</th>
                    <th>Thương hiệu</th>
                    <th>Giá</th>
                    <th>Tồn kho</th>
                    <th>Danh mục</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${products}">
                    <td>
                        <img th:src="${p.imagePath}" 
                             style="width:60px; height:60px; object-fit:cover" 
                             class="rounded border">
                    </td>
                    <td class="fw-bold" th:text="${p.name}"></td>
                    <td th:text="${p.brand}"></td>
                    <td class="text-danger fw-bold" 
                        th:text="${#numbers.formatDecimal(p.price,0,'COMMA',0,'POINT')} + ' VND'">
                    </td>
                    <td>
                        <span class="badge" 
                              th:classappend="${p.stock > 0 ? 'bg-success' : 'bg-danger'}"
                              th:text="${p.stock} + ' cái'">
                        </span>
                    </td>
                    <td>
                        <span class="badge bg-info" th:text="${p.category.name}"></span>
                    </td>
                    <td>
                        <a th:href="@{/admin/products/edit/{id}(id=${p.id})}" class="btn btn-warning btn-sm">
                            <i class="fas fa-edit"></i> Sửa
                        </a>
                        <a th:href="@{/admin/products/delete/{id}(id=${p.id})}" 
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Bạn chắc chắn muốn xóa?')">
                            <i class="fas fa-trash"></i> Xóa
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
