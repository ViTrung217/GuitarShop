<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('Sản phẩm')"></head>

<body>
<div th:replace="fragments/admin-navbar :: adminNavbar"></div>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <h2 class="mb-4" th:text="${isEdit ? '✏️ Cập nhật sản phẩm' : '➕ Thêm sản phẩm mới'}"></h2>
            
            <form th:action="@{/admin/products/save}" method="post" enctype="multipart/form-data"
                  th:object="${product}" class="needs-validation">
                
                <input type="hidden" th:field="*{id}" th:if="${isEdit}">
                <input type="hidden" th:field="*{imagePath}" th:if="${isEdit}">
                
                <div class="mb-3">
                    <label class="form-label">Tên sản phẩm *</label>
                    <input type="text" class="form-control" th:field="*{name}" 
                           placeholder="VD: CEF-39 Acoustic" required>
                </div>
                
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Thương hiệu *</label>
                            <input type="text" class="form-control" th:field="*{brand}" 
                                   placeholder="VD: CEF" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Danh mục *</label>
                            <select class="form-control" name="categoryId" required>
                                <option value="">-- Chọn danh mục --</option>
                                <option th:each="c : ${categories}" 
                                        th:value="${c.id}" 
                                        th:text="${c.name}"
                                        th:selected="${product.category != null && product.category.id == c.id}">
                                </option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Giá (VND) *</label>
                            <input type="number" class="form-control" th:field="*{price}" 
                                   placeholder="2500000" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Tồn kho *</label>
                            <input type="number" class="form-control" th:field="*{stock}" 
                                   placeholder="10" required>
                        </div>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Mô tả *</label>
                    <textarea class="form-control" th:field="*{description}" rows="4"
                              placeholder="Nhập mô tả sản phẩm" required></textarea>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Hình ảnh <span th:if="${!isEdit}">*</span></label>
                    <input type="file" class="form-control" name="image" accept="image/*">
                    <small class="text-muted">Có thể tải file trực tiếp hoặc nhập URL ảnh bên dưới. Ảnh sẽ được lưu vào thư mục data/guitar.</small>
                </div>

                <div class="mb-3">
                    <label class="form-label">Hoặc nhập URL ảnh</label>
                    <input type="url" class="form-control" name="imageUrl"
                           placeholder="https://example.com/guitar.jpg">
                    <small class="text-muted" th:text="${isEdit ? 'Để trống nếu không muốn thay đổi ảnh' : 'Khi thêm mới, chọn 1 trong 2 cách: upload file hoặc nhập URL'}"></small>
                    <div th:if="${isEdit and product.imagePath != null and !#strings.isEmpty(product.imagePath)}" class="mt-2">
                        <img th:src="${product.imagePath}" style="max-width: 200px; max-height: 200px;" alt="Current image">
                    </div>
                </div>
                
                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                    <a th:href="@{/admin/products}" class="btn btn-secondary">Quay lại</a>
                    <button type="submit" class="btn btn-success btn-lg">
                        <i class="fas fa-save"></i> Lưu sản phẩm
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
