<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Người dùng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="fragments/admin-navbar :: adminNavbar"></div>

    <div class="container mt-5">
        <div class="row">
            <div class="col-md-6 offset-md-3">
                <h2 th:text="${user.id != null ? '✏️ Cập nhật người dùng' : '➕ Thêm người dùng mới'}"></h2>
                <form th:action="@{/admin/users/save}" method="post" th:object="${user}">
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                    <input type="hidden" th:field="*{id}" th:if="${user.id != null}">
                    
                    <div class="mb-3">
                        <label for="username" class="form-label">Tên đăng nhập <span th:if="${user.id == null}">*</span></label>
                        <input type="text" class="form-control" id="username" th:field="*{username}" 
                               th:readonly="${user.id != null}" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Mật khẩu <span th:if="${user.id == null}">*</span></label>
                        <input type="password" class="form-control" id="password" name="password" 
                               th:required="${user.id == null}"
                               th:placeholder="${user.id != null ? 'Để trống nếu không thay đổi' : 'Nhập mật khẩu'}">
                    </div>

                    <div class="mb-3">
                        <label for="fullName" class="form-label">Họ tên *</label>
                        <input type="text" class="form-control" id="fullName" th:field="*{fullName}" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" th:field="*{email}">
                    </div>

                    <div class="mb-3">
                        <label for="phone" class="form-label">Số điện thoại</label>
                        <input type="text" class="form-control" id="phone" th:field="*{phone}">
                    </div>

                    <div class="mb-3">
                        <label for="address" class="form-label">Địa chỉ</label>
                        <input type="text" class="form-control" id="address" th:field="*{address}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Vai trò *</label>
                        <div class="form-check" th:each="r : ${roles}">
                            <input class="form-check-input" type="checkbox"
                                   th:id="${'role_' + r.id}"
                                   name="roleIds"
                                   th:value="${r.id}"
                                th:checked="${user.roles != null and #lists.contains(user.roles.![name], r.name)}">
                            <label class="form-check-label" th:for="${'role_' + r.id}">
                                <span th:text="${r.name == 'ROLE_ADMIN' ? 'Admin' : 'User'}"></span>
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Lưu
                    </button>
                    <a href="/admin/users" class="btn btn-secondary">
                        <i class="fas fa-times"></i> Hủy
                    </a>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
