<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Guitar Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px 0;
        }
        .register-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
            width: 100%;
            max-width: 500px;
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .register-header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        .register-header h1 {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .register-header p {
            font-size: 14px;
            opacity: 0.9;
            margin: 0;
        }
        .register-body {
            padding: 40px 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 12px 15px;
            font-size: 15px;
            transition: all 0.3s ease;
            background-color: #f8f9fa;
        }
        .form-control:focus {
            border-color: #f5576c;
            background-color: white;
            box-shadow: 0 0 0 3px rgba(245, 87, 108, 0.1);
        }
        .input-icon {
            position: relative;
        }
        .input-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #f5576c;
            font-size: 16px;
        }
        .input-icon input {
            padding-left: 45px;
        }
        .btn-register {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(245, 87, 108, 0.3);
        }
        .btn-register:active {
            transform: translateY(0);
        }
        .register-footer {
            padding: 20px 30px;
            background-color: #f8f9fa;
            text-align: center;
            border-top: 1px solid #e0e0e0;
        }
        .register-footer p {
            margin: 0;
            color: #666;
            font-size: 14px;
        }
        .register-footer a {
            color: #f5576c;
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
        }
        .register-footer a:hover {
            text-decoration: underline;
        }
        .info-text {
            background-color: #e7f3ff;
            color: #0066cc;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            border-left: 4px solid #0066cc;
        }
    </style>
</head>
<body>
<div class="register-container">
    <div class="register-header">
        <h1>🎸 Guitar Shop</h1>
        <p>Tạo tài khoản mới để bắt đầu</p>
    </div>

    <div class="register-body">
        <!-- Thông báo lỗi nếu username đã tồn tại -->
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <i class="fas fa-exclamation-circle"></i>
            <strong>Lỗi!</strong> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="info-text">
            <i class="fas fa-info-circle"></i> Vui lòng điền đầy đủ thông tin để tạo tài khoản
        </div>

        <form th:action="@{/register}" th:object="${dto}" method="post">
            <!-- CSRF Token -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            
            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-user"></i> Tên đăng nhập
                </label>
                <div class="input-icon">
                    <i class="fas fa-user"></i>
                    <input type="text" class="form-control" th:field="*{username}" 
                           placeholder="Nhập tên đăng nhập (4-20 ký tự)" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-id-card"></i> Họ và tên
                </label>
                <div class="input-icon">
                    <i class="fas fa-id-card"></i>
                    <input type="text" class="form-control" th:field="*{fullName}" 
                           placeholder="Nhập họ và tên" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-lock"></i> Mật khẩu
                </label>
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" class="form-control" th:field="*{password}" 
                           placeholder="Nhập mật khẩu (tối thiểu 6 ký tự)" required>
                </div>
            </div>

            <button type="submit" class="btn btn-register">
                <i class="fas fa-user-plus"></i> Đăng ký tài khoản
            </button>
        </form>
    </div>

    <div class="register-footer">
        <p>
            Đã có tài khoản?
            <a th:href="@{/login}">
                <i class="fas fa-arrow-right"></i> Đăng nhập tại đây
            </a>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
